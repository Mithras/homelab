model_list:
  - model_name: qwen36-27
    litellm_params:
      litellm_credential_name: pc
      custom_llm_provider: custom_openai
      model: qwen36-27
      tags: ["pc"]
      additional_drop_params: ["reasoning_effort"]
    model_info:
      mode: chat
  - model_name: qwen3-4-embedding
    litellm_params:
      litellm_credential_name: gx10-embedding
      custom_llm_provider: openai_like
      model: Qwen3-Embedding-4B-Q4_K_M.gguf
      tags: ["gx10"]
    model_info:
      mode: embedding
  - model_name: qwen36-35
    litellm_params:
      litellm_credential_name: gx10
      custom_llm_provider: custom_openai
      model: Qwen/Qwen3.6-35B-A3B-FP8
      tags: ["gx10"]
      additional_drop_params: ["reasoning_effort"]
    model_info:
      mode: chat

credential_list:
  - credential_name: pc
    credential_values:
      api_base: http://192.168.0.2:8080/v1
      api_key: na
    credential_info: {}
  - credential_name: gx10
    credential_values:
      api_base: http://192.168.0.126:8000/v1
      api_key: na
    credential_info: {}
  - credential_name: gx10-embedding
    credential_values:
      api_base: http://192.168.0.126:8081/v1
      api_key: na
    credential_info: {}

general_settings:
  always_include_stream_usage: true

litellm_settings:
  fallbacks: 
    - "qwen-dense": ["qwen-moe"]
  # callbacks:
  #   - websearch_interception
  # websearch_interception_params:
