#       search_provider: searxng
#       api_base: http://192.168.0.6:8889/

router_settings:
  routing_strategy: simple-shuffle  # `least-busy` doesn't work
  model_group_alias:
    qwen-dense: qwen36-27
    qwen-moe: qwen36-35
    qwen-embedding: qwen3-4-embedding
