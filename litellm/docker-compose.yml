services:
  litellm:
    # image: docker.litellm.ai/berriai/litellm:main-stable
    image: docker.litellm.ai/berriai/litellm:v1.83.7-stable
    restart: unless-stopped
    command:
      - --config=/app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@db:5432/litellm
    volumes:
      - ./config.yaml:/app/config.yaml
    ports:
      - 4000:4000
    depends_on:
      - db
    networks:
      - litellm
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U litellm"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - litellm

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - litellm_prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
    networks:
      - litellm

volumes:
  litellm_prometheus_data:
    name: litellm_prometheus_data
  litellm_postgres_data:
    name: litellm_postgres_data

networks:
    litellm:
