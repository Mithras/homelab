services:
  llama:
    restart: unless-stopped
    # image: llama:hip
    # image: llama:vulkan
    entrypoint: ./llama-server
    # --rpc 192.168.100.2:50052,192.168.200.2:50052
    command: >
      --host 0.0.0.0
      --port 8080
      --offline
      --models-max 1
      --models-preset /app/config.ini

      --threads 16
      -ngl -1
      --no-mmap
      --prio 2
      --prio-batch 2

      --flash-attn on
      --jinja
      --cache-ram 16384
    # --parallel 2
    # --kv-unified
    # Doesn't work with Vulcan/RDP
    # --cache-type-k bf16
    # --cache-type-v bf16
    environment:
      ROCBLAS_USE_HIPBLASLT: "1"
      # ibv_devinfo -v
      GGML_RDMA_DEV: rocep101s0f1
      GGML_RDMA_GID: "5"
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
      - /dev/infiniband:/dev/infiniband
      # - /dev/shm:/dev/shm
    volumes:
      - ./llama/cache:/root/.cache/llama.cpp/rpc
    ports:
      - 50052:50052
      - ./llama/config.ini:/app/config.ini
      - ./download/download:/download
    ports:
      - 8080:8080
    network_mode: host
    # ipc: host
    # privileged: true
    # shm_size: 2gb
    # cap_add:
    #   - IPC_LOCK

  llama-rpc:
    restart: unless-stopped
    image: llama:server-vulkan
    # image: llama:server-rocm
    # image: llama:server-cuda
    entrypoint: ./rpc-server
    command: >
      --host 0.0.0.0
      --port 50052
      --cache
      --threads 16
    environment:
      ROCBLAS_USE_HIPBLASLT: "1"
      # ibv_devinfo -v
      GGML_RDMA_DEV: rocep101s0

